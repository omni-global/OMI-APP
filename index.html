<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Global | World Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sos-alert { background: linear-gradient(to right, #ef4444, #b91c1c); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        
        <div class="glass p-6 rounded-3xl mb-8 border-red-500/30">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-red-500 font-black text-xl">WORLDWIDE WOMEN SECURITY</h2>
                    <p class="text-gray-400 text-xs">Emergency Help & Live Tracking Active</p>
                </div>
                <button onclick="window.location.href='tel:112'" class="sos-alert text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-red-500/50">
                    SOS HELP
                </button>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] mb-10 border-sky-500/30">
            <h3 class="text-center text-sky-400 font-bold mb-6 italic tracking-widest uppercase text-sm">Omni Global Intelligence</h3>
            <div class="flex flex-col gap-4">
                <input type="text" id="userInput" placeholder="Paisa kaise kamaye? Ya koi pareshani..." class="w-full p-5 bg-black/50 border border-white/20 rounded-2xl outline-none focus:border-sky-500 text-lg">
                <button onclick="solve()" class="w-full bg-sky-500 text-black font-black py-4 rounded-2xl hover:bg-sky-400 transition-all">GET SOLUTION NOW</button>
            </div>
            
            <div id="result" class="hidden mt-8 p-6 bg-sky-500/10 border border-sky-500/30 rounded-2xl animate-fade-in">
                <p id="resultText" class="text-gray-100 leading-relaxed"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-3xl">
                <h4 class="text-sky-400 font-bold mb-4">🌍 World News</h4>
                <p class="text-sm text-gray-400">Global Economy is shifting to Digital Assets. AI is creating new wealth in 2026.</p>
            </div>
            <div class="glass p-6 rounded-3xl">
                <h4 class="text-green-500 font-bold mb-4">💰 Money Solution</h4>
                <p class="text-sm text-gray-400">Current Best: Global Freelancing & AI Automation. Target: $10,000/month.</p>
            </div>
        </div>

    </div>

    <script>
        function solve() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const res = document.getElementById('result');
            const txt = document.getElementById('resultText');

            res.style.display = 'block'; // Forcefully show the box

            if (val.includes('paisa') || val.includes('money') || val.includes('kamaye')) {
                txt.innerHTML = "<b>Money Problem Solved:</b> 2026 mein paisa kamane ke 3 bade raste: <br>1. Global AI Agency kholiye. <br>2. Digital Products banaiye. <br>3. International Market Trading. Hum aapko iska pura roadmap denge.";
            } else if (val.includes('security') || val.includes('women')) {
                txt.innerHTML = "<b>Security Protocol:</b> Aapka SOS system direct International Help Center se juda hai. Aapki location 112 par notify kar di gayi hai. Safe rahein.";
            } else {
                txt.innerHTML = "Omni AI is searching for your specific problem: '" + val + "'. Hum duniya bhar ke database se best solution nikal rahe hain. Thoda intezar karein.";
            }
        }
    </script>
</body>
</html>
